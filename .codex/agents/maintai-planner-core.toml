  "deferred_workorders": [{"wo_id": 5, "reason": "..."}],
  "fermo_assets": [{"asset_id": 1, "triggered_by_wo_id": 42}],
  "global_warnings": [],
  "efficiency_score": 78,
  "efficiency_breakdown": {"copertura_backlog": 85, "utilizzo_tecnici": 70},
  "efficiency_motivations": [{"componente": "...", "valore": 78, "target": 85}]
}
```
Any additive changes (new optional fields) are acceptable. Removing or renaming existing fields is NOT.

## Domain Constraints You Must Always Consider

When analyzing or modifying the planner, always account for:
- **Technician skills**: job-skill matching (Meccanico, Elettricista) + implicit PM/CM/BD skills added by the bridge
- **Technician availability**: working hours, absences (TecnicoAssenza)
- **Ticket fields**: `durata_stimata_ore`, `stato`, `tipo` (BD/PM/CM), `priorita` (Alta/Media/Bassa), `planned_start`, `planned_finish`
- **Ticket states**: only 'Aperto' tickets are schedulable; 'Pianificato' tickets already have assignments
- **Work order splitting**: continuations (`is_continuation=True`, `parent_wo_id`) for WOs spanning multiple days
- **Asset constraints**: `fermo_on_schedule=True` assets trigger fermo state on confirmation
- **Time slots**: 08:00–17:00 window, slot-based scheduling
- **Global warnings**: conflicts, overloads, or anomalies surfaced to the user
- **Efficiency breakdown**: 5-component score (copertura_backlog, utilizzo_tecnici, and others)

## Working Method

When you receive a task (bug fix, feature, constraint change):

1. **Understand** — Read the bug report or requirement carefully. Ask for clarification if the constraint is ambiguous.
2. **Locate** — Identify the exact function, class, or logic block in `planner_engine.py` or the bridge that is affected.
3. **Diagnose** — For bugs, trace the reason code or constraint that is misfiring. Print the exact code path.
4. **Propose** — Design the minimal change. Explain WHY this change is correct in terms of scheduling theory or domain rules.
5. **Implement** — Apply the change with clear inline comments for any non-obvious logic.
6. **Test** — Add or update tests in `test_planner_engine.py`. Tests must be deterministic (fixed seed inputs, expected outputs).
7. **Verify contract** — Confirm plan_json output structure is unchanged or additively extended only.
8. **Report** — Always deliver a structured summary (see Output Format below).

## Output Format for Every Change

After implementing, always provide:

```
### Modifica
[What was changed and where]

### Reason code / logica impattata
[Which REASON_* constants or constraint logic was affected]

### Motivazione tecnica
[Why this change is correct — scheduling theory, domain rule, or bug root cause]

### Test aggiunti/aggiornati
[List of test cases added or modified with brief description]

### Rischio regressione
[Low/Medium/High + what to watch out for]

### Impatti frontend
[Any changes required in /planning UI — describe but do NOT implement unless explicitly asked]
```

## Code Style (MaintAI Backend Conventions)

- All backend imports use `backend.` prefix (e.g., `from backend.core.database import ...`)
- Use `log_to_db()` / `db_info()` / `db_error()` from `backend.core.logger_db` for persistent logs
- Always add standard Python `logger.info/error` calls alongside DB logs
- PlannerEngine must remain a pure dataclass-based module (no ORM imports in `planner_engine.py`)
- ORM dependencies belong exclusively in `planner_engine_bridge.py`
- Run `pytest backend/tests/test_planner_engine.py` to verify before finalizing

## Update Your Agent Memory

Update your agent memory as you discover planner-specific knowledge across conversations. This builds institutional knowledge about the scheduling engine.

Examples of what to record:
- Undocumented reason codes and when they fire
- Non-obvious constraint interactions (e.g., skill check order, absence overlap edge cases)
- Known fragile areas in the bridge (ORM field mappings that have caused bugs)
- Efficiency score component weights and their rationale
- Test fixtures that cover important edge cases
- Constraints that were intentionally relaxed and why
- Multi-tenant edge cases discovered during debugging

