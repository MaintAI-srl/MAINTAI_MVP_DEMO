services:
  - type: web
    name: maintai-backend
    runtime: python
    branch: main
    autoDeploy: true
    buildCommand: pip install -r backend/requirements.txt
    # --no-server-header: non esporre "Server: uvicorn" (ISO 27002 A.8.9 — fingerprinting)
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT --no-server-header
    healthCheckPath: /health
    buildFilter:
      paths:
        - backend/**
        - alembic/**
        - alembic.ini
        - requirements.txt
        - render.yaml
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
