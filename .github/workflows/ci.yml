name: ci

# Quality gate riproducibile (richiesto dal security audit v1.2):
# test backend, build e lint frontend, SAST Semgrep (OWASP).
# Gli audit dipendenze e il secret scanning sono in security.yml; CodeQL in codeql.yml.

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest httpx
      - name: Run tests
        env:
          # Soli valori di test: i segreti reali vivono solo negli env di deploy.
          JWT_SECRET: testkeytestkeytestkeytestkeytestkey123
          ENCRYPTION_KEY: 3r5pKVqwiYFRHvvHWRXpTf4SSHAxv0NeZoAkzXam2UQ=
        run: python -m pytest backend/tests/ -q

  frontend-build:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  semgrep:
    name: SAST (Semgrep OWASP)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep scan --config p/owasp-top-ten --config p/security-audit --error --exclude frontend/node_modules --exclude frontend/.next
