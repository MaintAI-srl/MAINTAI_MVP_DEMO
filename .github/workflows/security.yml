name: security

# CI di sicurezza minima (SECURITY_GUIDELINES.md §9 Supply Chain, §10 SAST).
# - secret scanning (previene la ricaduta di segreti committati, vedi SEC-01)
# - audit dipendenze backend (pip-audit) e frontend (npm audit)

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: run gitleaks
        uses: gitleaks/gitleaks-action@518e4898c0cd1cc5d9aab6627a2eabd46e81d8da # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NB: per repository di un'ORGANIZZAZIONE gitleaks-action richiede una licenza gratuita.
          # Decommentare se necessario:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  backend-deps:
    name: Backend deps audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit backend/requirements.txt
        run: pip-audit -r backend/requirements.txt

  frontend-deps:
    name: Frontend deps audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: npm audit (high+)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
